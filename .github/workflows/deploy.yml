# GitHub Actions — Secrets and variables
#
# If you store values on the "github-pages" Environment (Settings → Environments →
# github-pages), the *build* job must use that environment too, or vars/secrets are
# empty at `npm run build` (only the deploy job would see them otherwise).
#
# Required for Supabase remote mode (either repo-level OR github-pages environment):
#   Secret:  VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY
#   Variable: VITE_SUPABASE_URL   e.g. https://YOUR_REF.supabase.co
#
# Required for automated DB migrations (migrate job, before build):
#   Secret:  SUPABASE_ACCESS_TOKEN   Personal access token (Dashboard → Account → Access Tokens)
#   Secret:  SUPABASE_DB_PASSWORD   Database password (Project Settings → Database), not the anon key
#   Migrations apply SQL only; they do not upload Storage objects. Seed paths must exist in buckets
#   or the app will fall back to bundled/static assets where implemented.
#
# Optional variables:
#   VITE_USE_STATIC_PROJECTS       "true" → bundled JSON, no Supabase
#   VITE_SUPABASE_IMAGE_TRANSFORMS "true" only on Supabase Pro+ (Storage transforms)

name: Deploy React App to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
        run: |
          set -euo pipefail
          URL="${VITE_SUPABASE_URL:-}"
          if [ -z "$URL" ]; then
            echo "VITE_SUPABASE_URL is not set; cannot derive project ref."
            exit 1
          fi
          PROJECT_REF="$(echo "$URL" | sed -E 's|^https?://([^.]+)\.supabase\.co/?.*|\1|')"
          if [ -z "$PROJECT_REF" ] || [ "$PROJECT_REF" = "$URL" ]; then
            echo "Could not parse project ref from VITE_SUPABASE_URL (expected https://<ref>.supabase.co): $URL"
            exit 1
          fi
          echo "Linking Supabase project ref: $PROJECT_REF"
          supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --yes

  build:
    needs: migrate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          VITE_USE_STATIC_PROJECTS: ${{ vars.VITE_USE_STATIC_PROJECTS }}
          VITE_SUPABASE_IMAGE_TRANSFORMS: ${{ vars.VITE_SUPABASE_IMAGE_TRANSFORMS }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
