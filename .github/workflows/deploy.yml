# GitHub Actions — Secrets and variables
#
# If you store values on the "github-pages" Environment (Settings → Environments →
# github-pages), the *build* job must use that environment too, or vars/secrets are
# empty at `npm run build` (only the deploy job would see them otherwise).
#
# Required for Supabase remote mode (either repo-level OR github-pages environment):
#   Secret:  VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY
#   Variable: VITE_SUPABASE_URL   e.g. https://YOUR_REF.supabase.co
#
# Optional variables:
#   VITE_USE_STATIC_PROJECTS       "true" → bundled JSON, no Supabase
#   VITE_SUPABASE_IMAGE_TRANSFORMS "true" only on Supabase Pro+ (Storage transforms)

name: Deploy React App to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          VITE_USE_STATIC_PROJECTS: ${{ vars.VITE_USE_STATIC_PROJECTS }}
          VITE_SUPABASE_IMAGE_TRANSFORMS: ${{ vars.VITE_SUPABASE_IMAGE_TRANSFORMS }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
